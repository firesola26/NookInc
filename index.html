<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NookPhone - Bell Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --nook-green: #43b581;
            --nook-leaf: #6cc18c;
            --nook-blue: #5da9e9;
            --phone-bg: #f9f6e8;
            --text-main: #6b5c4b;
            --border-color: #d8d1bc;
            --resetti-brown: #8b4513;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Fredoka', sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(180deg, #a8e063 0%, #56ab2f 100%);
            overflow: hidden;
        }

        .nook-phone { 
            background-color: var(--phone-bg); 
            border-radius: 40px; 
            width: 92vw; max-width: 380px; 
            height: 92vh; max-height: 750px;
            border: 8px solid #ffffff; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.25); 
            position: relative;
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .status-bar { padding: 20px 25px 5px; display: flex; justify-content: space-between; font-size: 13px; color: #8f7e68; font-weight: 600; }

        .app-body { 
            padding: 10px 20px 20px; 
            flex: 1; 
            display: flex; 
            flex-direction: column;
        }

        h2#headerText { margin: 5px 0 10px; font-size: 22px; text-align: center; color: var(--nook-green); transition: color 0.3s; }

        .input-group { 
            background: white; 
            border: 2px solid var(--border-color); 
            border-radius: 15px; 
            padding: 12px; 
            margin-bottom: 12px; 
        }

        label { display: block; font-size: 10px; font-weight: bold; color: var(--nook-green); margin-bottom: 4px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; border: none; font-family: 'Fredoka', sans-serif; font-size: 17px; 
            font-weight: 600; outline: none; background: transparent; color: var(--text-main);
        }

        .checkbox-container {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; font-size: 14px; margin: 10px 0; padding: 12px;
            color: var(--text-main); font-weight: bold;
            cursor: pointer; background: rgba(255,255,255,0.5); border-radius: 15px;
        }

        .checkbox-container input { width: 22px; height: 22px; accent-color: var(--nook-green); }

        .btn { 
            background: var(--nook-green); color: white; border: none; width: 100%; 
            padding: 18px; border-radius: 30px; font-weight: 600; font-size: 18px; 
            box-shadow: 0 5px 0 #329668; transition: all 0.1s; 
        }

        .btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 #329668; }
        .btn:disabled { background: #cbd5e0; box-shadow: 0 5px 0 #a0aec0; opacity: 0.8; }

        /* Shake animation for errors */
        .shake { animation: shakeBtn 0.4s ease-in-out; }
        @keyframes shakeBtn {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        .nook-chat { 
            display: flex; align-items: center; gap: 12px; background: #fff; 
            padding: 15px; border-radius: 20px; border: 2px solid var(--border-color); 
            margin-top: auto; font-size: 13px; line-height: 1.4; min-height: 85px;
        }

        #resettiOverlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffeb3b; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; border-radius: 32px;
        }
    </style>
</head>
<body>

    <div class="nook-phone">
        <div id="resettiOverlay">
            <div style="font-size: 60px;">⛏️🐹💢</div>
            <div id="resettiSpeech" style="background:white; padding:15px; border-radius:15px; border:3px solid var(--resetti-brown); font-weight:bold; margin-top:10px;">NOW HOLD ON!</div>
            <button class="btn" style="margin-top:20px; background: var(--resetti-brown); box-shadow:0 4px 0 #5d2e0a;" onclick="nextLecture()">NEXT >></button>
        </div>

        <div class="status-bar">
            <span id="time">--:--</span>
            <span>📶 5G 🔋</span>
        </div>

        <div class="app-body">
            <h2 id="headerText">Bell Requisition</h2>
            
            <div style="text-align: center; font-size: 10px; background: #fff; border: 1px solid var(--border-color); border-radius: 15px; padding: 5px; margin-bottom: 15px; font-weight: 600;">
                Official Rate: 124 Bells = 1.00 SGD
            </div>

            <form id="bellForm">
                <div class="input-group">
                    <label>Purpose of Funds</label>
                    <select id="category">
                        <option value="Home Renovation">🏠 Home Renovation</option>
                        <option value="Bridge/Incline">🌉 Infrastructure</option>
                        <option value="Turnip Investment">📈 Turnip Market</option>
                        <option value="Island Decor">🌸 Island Decor</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Amount (Bells 💰)</label>
                    <input type="number" id="bellAmount" placeholder="0" inputmode="numeric" required>
                    <div style="font-size: 11px; margin-top: 5px; color: #888;">SGD Equiv: <span id="sgdValue" style="color: var(--nook-green); font-weight: bold;">0.00</span></div>
                </div>

                <label class="checkbox-container">
                    <input type="checkbox" id="legalAgree">
                    <span>I agree to Nook Inc. terms.</span>
                </label>

                <div id="submitContainer" style="position: relative;">
                    <div id="badClickTracker" style="position: absolute; width: 100%; height: 60px; z-index: 5;" onclick="trackBadClick()"></div>
                    <button type="submit" id="submitBtn" class="btn" disabled>SUBMIT TO REP</button>
                </div>
            </form>

            <div class="nook-chat">
                <div style="font-size: 28px;">🦝</div>
                <div id="nookQuote">Welcome! Please fill out the paperwork, yes, yes!</div>
            </div>
        </div>
    </div>

    <script>
        const RATE = 124;
        let badClicks = 0;
        let lectureStep = 0;
        const resettiLines = ["STOP RIGHT THERE!", "The checkbox isn't a suggestion!", "No check, no Bells! Simple!", "Now focus and check the box!"];

        const bellInput = document.getElementById('bellAmount');
        const submitBtn = document.getElementById('submitBtn');
        const nookQuote = document.getElementById('nookQuote');
        const legalCheck = document.getElementById('legalAgree');
        const headerText = document.getElementById('headerText');
        const categorySelect = document.getElementById('category');

        function updateUI() {
            const val = parseInt(bellInput.value) || 0;
            const category = categorySelect.value;
            const sgd = (val / RATE).toFixed(2);
            document.getElementById('sgdValue').innerText = sgd;

            // Restore the specific Quote Logic
            if (val < 0) {
                nookQuote.innerText = "Negative Bells? Ho ho! You are trying to take money from ME, yes, yes?!";
                submitBtn.disabled = true;
                return;
            }

            if (val >= 1000000) {
                bellInput.value = 1000000;
                nookQuote.innerText = "One million Bells is the limit! Even my safe has its boundaries, yes, yes!";
            } else if (category === "Turnip Investment" && val > 0) {
                nookQuote.innerText = `Investing ${val.toLocaleString()} Bells? Bold! Daisy Mae doesn't give refunds, yes, yes!`;
            } else if (val >= 6000) {
                nookQuote.innerText = `${val.toLocaleString()} Bells? Ho ho! That's almost enough for a small window upgrade!`;
            } else if (val >= 1240) {
                nookQuote.innerText = `${val.toLocaleString()} Bells? Exactly the price of a standard shovel, yes, yes!`;
            } else {
                nookQuote.innerText = val > 0 ? `I'll process your request for ${val.toLocaleString()} Bells.` : "Welcome! Please fill out the paperwork, yes, yes!";
            }

            // Button styling for high amounts
            if (val > 10000) {
                headerText.innerText = "Community Donation";
                headerText.style.color = "var(--nook-blue)";
                submitBtn.className = "btn btn-blue";
            } else {
                headerText.innerText = "Bell Requisition";
                headerText.style.color = "var(--nook-green)";
                submitBtn.className = "btn";
            }

            submitBtn.disabled = !legalCheck.checked || val <= 0;
            document.getElementById('badClickTracker').style.display = legalCheck.checked ? 'none' : 'block';
        }

        function trackBadClick() {
            if (!legalCheck.checked) {
                badClicks++;
                
                // Shake the button
                submitBtn.classList.remove('shake');
                void submitBtn.offsetWidth; // Trigger reflow
                submitBtn.classList.add('shake');

                if ("vibrate" in navigator) navigator.vibrate(80);

                if (badClicks >= 3) {
                    document.getElementById('resettiOverlay').style.display = 'flex';
                } else {
                    nookQuote.innerText = `Watch out! Resetti is watching... (${badClicks}/3)`;
                }
            }
        }

        function nextLecture() {
            if (lectureStep < resettiLines.length) {
                document.getElementById('resettiSpeech').innerText = resettiLines[lectureStep++];
            } else { location.reload(); }
        }

        bellInput.addEventListener('input', updateUI);
        legalCheck.addEventListener('change', updateUI);
        categorySelect.addEventListener('change', updateUI);

        document.getElementById('bellForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Sent! Tom Nook has received your request.");
            location.reload();
        });

        function updateClock() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
